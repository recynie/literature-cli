# config.toml — shareable settings
# Copy to ~/.config/litcli/config.toml (user-level) or .litcli/config.toml (project-level).
# Do NOT put secrets here; use auth.toml instead.

[openai]
base_url    = "https://api.openai.com/v1"
model       = "gpt-4o-mini"
max_tokens  = 4000
temperature = 0.7

[litcli]
data_dir  = "~/.litcli"
pdf_pages = 10

[services]
unpaywall_email = "you@example.com"
openalex_email = "you@example.com"
# semantic_scholar_api_key = ""

[mineru]
# Optional MinerU PDF parsing settings.
# model: "vlm" (default, best quality) | "pipeline" | "html"
model = "vlm"
ocr = true
language = "en"
